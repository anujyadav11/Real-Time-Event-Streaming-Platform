global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  - job_name: "gateway"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8080

  - job_name: "order-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8081

  - job_name: "delivery-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8086

  - job_name: "inventory-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8082

  - job_name: "notification-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8084

  - job_name: "payment-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8083

  - job_name: "saga-orchestrator"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8090

  - job_name: "websocket-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8088

  - job_name: "config-server"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8888

  - job_name: "auth-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8088

  - job_name: "pricing-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8089

  - job_name: "discovery-server"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8761
