services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: event_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro

    networks:
      - event-platform-network

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d event_platform" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: redis
    restart: unless-stopped

    ports:
      - "6379:6379"

    command: redis-server --appendonly yes

    volumes:
      - redis-data:/data

    networks:
      - event-platform-network

    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka
    restart: unless-stopped

    ports:
      - "9092:9092"
      - "29092:29092"

    environment:
      # KRaft Configuration
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

      # Listeners
      KAFKA_LISTENERS: PLAINTEXT://:9092,PLAINTEXT_INTERNAL://:29092,CONTROLLER://:9093

      # What clients see
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT

      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

    volumes:
      - kafka-data:/var/lib/kafka/data

    networks:
      - event-platform-network

    healthcheck:
      test: [ "CMD-SHELL", "nc -z localhost 9092 || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui

    restart: unless-stopped

    depends_on:
      kafka:
        condition: service_healthy

    ports:
      - "8085:8080"

    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

    networks:
      - event-platform-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped

    ports:
      - "9090:9090"

    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro

    networks:
      - event-platform-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana

    restart: unless-stopped

    ports:
      - "3000:3000"

    volumes:
      - grafana-data:/var/lib/grafana

    depends_on:
      - prometheus

    networks:
      - event-platform-network

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin

    restart: unless-stopped

    ports:
      - "9411:9411"

    networks:
      - event-platform-network

  config-server:
    build:
      context: ..
      dockerfile: docker/config-server/Dockerfile

    image: config-server:1.0

    container_name: config-server

    restart: unless-stopped

    ports:
      - "8888:8888"

    environment:
      JAVA_OPTS: "-Xms256m -Xmx512m"

    healthcheck:
      test: [ "CMD-SHELL", "curl --fail --silent http://localhost:8888/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

    networks:
      - event-platform-network

  discovery-server:
    build:
      context: ..
      dockerfile: docker/discovery-server/Dockerfile

    image: discovery-server:1.0

    container_name: discovery-server

    restart: unless-stopped

    ports:
      - "8761:8761"

    environment:
      SERVER_PORT: 8761
      JAVA_OPTS: "-Xms256m -Xmx512m"
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"

    depends_on:
      config-server:
        condition: service_healthy

    healthcheck:
      test: [ "CMD-SHELL", "curl --fail --silent http://localhost:8761/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

    networks:
      - event-platform-network

  api-gateway:
    build:
      context: ..
      dockerfile: docker/api-gateway/Dockerfile

    image: api-gateway:1.0

    container_name: api-gateway

    restart: unless-stopped

    ports:
      - "8080:8080"

    environment:
      JAVA_OPTS: "-Xms256m -Xmx512m"
      SERVER_PORT: 8080
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"
      # This must use the exact Spring property name. EUREKA_SERVER_URL only
      # resolves placeholders; it does not override a Config Server property.
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
      JWT_SECRET: MyVerySecretKeyForJwtAuthentication123456789

    depends_on:
      config-server:
        condition: service_healthy

      discovery-server:
        condition: service_healthy

    networks:
      - event-platform-network

  auth-service:
    build:
      context: ..
      dockerfile: docker/auth-service/Dockerfile

    image: auth-service:1.0

    container_name: auth-service

    restart: unless-stopped

    ports:
      - "8087:8087"

    environment:
      SERVER_PORT: 8087
      JAVA_OPTS: "-Xms256m -Xmx512m"

      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888

      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/

      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092

      REDIS_HOST: redis
      # Config Server resolves ${REDIS_HOST} on the server side. Set the
      # concrete Spring property so this container never falls back to localhost.
      SPRING_DATA_REDIS_HOST: redis

      AUTH_DB_URL: jdbc:postgresql://postgres:5432/auth
      AUTH_DB_USERNAME: postgres
      AUTH_DB_PASSWORD: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

      JWT_SECRET: MyVerySecretKeyForJwtAuthentication123456789

    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

    networks:
      - event-platform-network

  order-service:
    build:
      context: ..
      dockerfile: docker/order-service/Dockerfile

    image: order-service:1.0
    container_name: order-service

    restart: unless-stopped

    ports:
      - "8081:8081"

    environment:
      SERVER_PORT: 8081

      JAVA_OPTS: "-Xms256m -Xmx512m"

      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"

      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
      PRICING_SERVICE_URL: http://pricing-service:8089

      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_KAFKA_CONSUMER_PROPERTIES_SPRING_JSON_TRUSTED_PACKAGES: com.example.eventstream.common.*

      REDIS_HOST: redis
      SPRING_DATA_REDIS_HOST: redis

      ORDER_DB_URL: jdbc:postgresql://postgres:5432/orders
      ORDER_DB_USERNAME: postgres
      ORDER_DB_PASSWORD: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/orders
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

    networks:
      - event-platform-network

  pricing-service:
    build:
      context: ..
      dockerfile: docker/pricing-service/Dockerfile
    image: pricing-service:1.0
    container_name: pricing-service
    restart: unless-stopped
    ports:
      - "8089:8089"
    environment:
      SERVER_PORT: 8089
      JAVA_OPTS: "-Xms256m -Xmx512m"
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
      REDIS_HOST: redis
      SPRING_DATA_REDIS_HOST: redis
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - event-platform-network

  inventory-service:
    build:
      context: ..
      dockerfile: docker/inventory-service/Dockerfile
    image: inventory-service:1.0
    container_name: inventory-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      JAVA_OPTS: "-Xms256m -Xmx512m"
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_KAFKA_CONSUMER_PROPERTIES_SPRING_JSON_TRUSTED_PACKAGES: com.example.eventstream.common.*
      REDIS_HOST: redis
      SPRING_DATA_REDIS_HOST: redis
      INVENTORY_DB_URL: jdbc:postgresql://postgres:5432/inventory
      INVENTORY_DB_USERNAME: postgres
      INVENTORY_DB_PASSWORD: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/inventory
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - event-platform-network

  payment-service:
    build:
      context: ..
      dockerfile: docker/payment-service/Dockerfile
    image: payment-service:1.0
    container_name: payment-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: 8083
      JAVA_OPTS: "-Xms256m -Xmx512m"
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_KAFKA_CONSUMER_PROPERTIES_SPRING_JSON_TRUSTED_PACKAGES: com.example.eventstream.common.*
      REDIS_HOST: redis
      SPRING_DATA_REDIS_HOST: redis
      PAYMENT_DB_URL: jdbc:postgresql://postgres:5432/payment
      PAYMENT_DB_USERNAME: postgres
      PAYMENT_DB_PASSWORD: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payment
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - event-platform-network

  saga-orchestrator:
    build:
      context: ..
      dockerfile: docker/saga-orchestrator/Dockerfile
    image: saga-orchestrator:1.0
    container_name: saga-orchestrator
    restart: unless-stopped
    ports:
      - "8090:8085"
    environment:
      SERVER_PORT: 8085
      JAVA_OPTS: "-Xms256m -Xmx512m"
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_KAFKA_CONSUMER_PROPERTIES_SPRING_JSON_TRUSTED_PACKAGES: com.example.eventstream.common.*
      REDIS_HOST: redis
      SPRING_DATA_REDIS_HOST: redis
      SAGA_DB_URL: jdbc:postgresql://postgres:5432/saga
      SAGA_DB_USERNAME: postgres
      SAGA_DB_PASSWORD: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/saga
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - event-platform-network

  delivery-service:
    build:
      context: ..
      dockerfile: docker/delivery-service/Dockerfile
    image: delivery-service:1.0
    container_name: delivery-service
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      SERVER_PORT: 8086
      JAVA_OPTS: "-Xms256m -Xmx512m"
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_KAFKA_CONSUMER_PROPERTIES_SPRING_JSON_TRUSTED_PACKAGES: com.example.eventstream.common.*
      REDIS_HOST: redis
      SPRING_DATA_REDIS_HOST: redis
      DELIVERY_DB_URL: jdbc:postgresql://postgres:5432/delivery
      DELIVERY_DB_USERNAME: postgres
      DELIVERY_DB_PASSWORD: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/delivery
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - event-platform-network

  notification-service:
    build:
      context: ..
      dockerfile: docker/notification-service/Dockerfile
    image: notification-service:1.0
    container_name: notification-service
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      SERVER_PORT: 8084
      JAVA_OPTS: "-Xms256m -Xmx512m"
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_KAFKA_CONSUMER_PROPERTIES_SPRING_JSON_TRUSTED_PACKAGES: com.example.eventstream.common.*
      REDIS_HOST: redis
      SPRING_DATA_REDIS_HOST: redis
      NOTIFICATION_DB_URL: jdbc:postgresql://postgres:5432/notification
      NOTIFICATION_DB_USERNAME: postgres
      NOTIFICATION_DB_PASSWORD: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/notification
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: MyVerySecretKeyForJwtAuthentication123456789
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - event-platform-network

  websocket-service:
    build:
      context: ..
      dockerfile: docker/websocket-service/Dockerfile
    image: websocket-service:1.0
    container_name: websocket-service
    restart: unless-stopped
    ports:
      - "8088:8088"
    environment:
      SERVER_PORT: 8088
      JAVA_OPTS: "-Xms256m -Xmx512m"
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - event-platform-network

volumes:
  postgres-data:
  redis-data:
  kafka-data:
  grafana-data:

networks:
  event-platform-network:
    driver: bridge
