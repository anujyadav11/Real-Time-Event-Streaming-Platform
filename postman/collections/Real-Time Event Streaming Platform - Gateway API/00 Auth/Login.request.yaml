$kind: http-request
name: 'Login'
method: POST
url: '{{base_url}}/auth/login'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "username": "{{username}}",
      "password": "{{password}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Login returned 2xx', function () {
        pm.expect(pm.response.code).to.be.within(200, 299);
      });

      const json = pm.response.json();
      pm.test('Response contains accessToken', function () {
        pm.expect(json).to.have.property('accessToken');
      });

      if (json.accessToken) {
        pm.collectionVariables.set('access_token', json.accessToken);
      }
