$kind: collection
name: Real-Time Event Streaming Platform - Gateway API
description: |-
  Gateway-based Postman collection generated from the Spring Boot codebase.

  All requests go through the API Gateway on port 8080 using {{base_url}}.  
  Discovered REST controllers:

  - Auth: POST /auth/login
      
  - Pricing: GET /api/pricing/products/{productId}
      
  - Inventory: GET /api/v1/inventory/{productId}; POST reserve/release/confirm
      
  - Orders: POST/GET/DELETE /api/v1/orders
      
  - Deliveries: GET /api/v1/deliveries/{orderId}
variables:
  base_url: http://localhost:8080
  username: admin
  password: admin123
  access_token: ""
  product_id: "1"
  quantity: "1"
  order_id: 00000000-0000-0000-0000-000000000000
  payment_completed_poll_attempt: ""
  final_flow_poll_attempt: ""
