$kind: http-request
name: 'Release Inventory'
method: POST
url: '{{base_url}}/api/v1/inventory/release'
order: 3000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{access_token}}'
body:
  type: json
  content: |-
    {
      "productId": {{product_id}},
      "quantity": {{quantity}}
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Inventory release is successful', function () {
        pm.expect(pm.response.code).to.be.within(200, 299);
      });
