$kind: http-request
name: 'Delete Order'
method: DELETE
url: '{{base_url}}/api/v1/orders/:id'
order: 4000
headers:
  - key: Authorization
    value: 'Bearer {{access_token}}'
pathVariables:
  - key: id
    value: '{{order_id}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Delete order returned 2xx or 204', function () {
        pm.expect(pm.response.code).to.be.oneOf([200, 202, 204]);
      });
