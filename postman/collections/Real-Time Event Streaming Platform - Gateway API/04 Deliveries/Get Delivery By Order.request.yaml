$kind: http-request
name: 'Get Delivery By Order'
method: GET
url: '{{base_url}}/api/v1/deliveries/:orderId'
order: 1000
headers:
  - key: Authorization
    value: 'Bearer {{access_token}}'
pathVariables:
  - key: orderId
    value: '{{order_id}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Delivery lookup returned a valid response', function () {
        pm.expect(pm.response.code).to.be.oneOf([200, 202, 404]);
      });
