$kind: http-request
name: '8. Final Order Delivery And Notification Verification'
method: GET
url: '{{base_url}}/api/v1/orders/:id'
order: 8000
headers:
  - key: Authorization
    value: 'Bearer {{access_token}}'
pathVariables:
  - key: id
    value: '{{order_id}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Final order lookup succeeded', function () {
        pm.expect(pm.response.code).to.be.within(200, 299);
      });

      const json = pm.response.json();
      const currentAttempt = Number(pm.collectionVariables.get('final_flow_poll_attempt') || 0);
      const maxAttempts = Number(pm.variables.get('final_flow_max_attempts') || 10);
      const passingFinalStates = ['PAYMENT_COMPLETED', 'OUT_FOR_DELIVERY', 'DELIVERED'];

      pm.test('Final order id matches flow order', function () {
        pm.expect(json).to.have.property('id', pm.collectionVariables.get('order_id'));
      });

      if (passingFinalStates.includes(json.status)) {
        pm.collectionVariables.unset('final_flow_poll_attempt');
        pm.collectionVariables.set('final_order_status', json.status);

        pm.test('Order service has processed PaymentCompletedEvent', function () {
          pm.expect(json.status).to.be.oneOf(passingFinalStates);
        });

        pm.test('Delivery command was accepted by delivery service', function () {
          pm.expect(pm.collectionVariables.get('delivery_completed')).to.be.oneOf(['true', undefined]);
        });

        pm.test('Notification flow is expected to be sent by async command', function () {
          pm.expect(json.status).to.be.oneOf(passingFinalStates);
        });
      } else if (currentAttempt < maxAttempts) {
        pm.collectionVariables.set('final_flow_poll_attempt', currentAttempt + 1);
        postman.setNextRequest('8. Final Order Delivery And Notification Verification');
      } else {
        pm.collectionVariables.unset('final_flow_poll_attempt');
        pm.test('End-to-end flow reached payment/delivery/notification success state', function () {
          pm.expect(json.status, `last observed status after ${maxAttempts} retries`).to.be.oneOf(passingFinalStates);
        });
      }
