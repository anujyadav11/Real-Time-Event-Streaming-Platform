$kind: http-request
name: '7. Get Delivery For Order'
method: GET
url: '{{base_url}}/api/v1/deliveries/:orderId'
order: 7000
headers:
  - key: Authorization
    value: 'Bearer {{access_token}}'
pathVariables:
  - key: orderId
    value: '{{order_id}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Delivery endpoint responded successfully', function () {
        pm.expect(pm.response.code).to.be.within(200, 299);
      });

      const json = pm.response.json();

      pm.test('Delivery service received command for this order', function () {
        pm.expect(json).to.have.property('orderId', pm.collectionVariables.get('order_id'));
      });

      pm.test('Delivery is in a valid passing state', function () {
        pm.expect(json.status).to.be.oneOf(['CREATED', 'DRIVER_ASSIGNED', 'PICKED_UP', 'OUT_FOR_DELIVERY', 'DELIVERED']);
      });

      if (json.status === 'DELIVERED') {
        pm.collectionVariables.set('delivery_completed', 'true');
      }
