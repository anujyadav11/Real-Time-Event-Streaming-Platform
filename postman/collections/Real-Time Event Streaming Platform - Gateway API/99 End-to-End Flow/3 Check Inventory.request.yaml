$kind: http-request
name: '3. Check Inventory'
method: GET
url: '{{base_url}}/api/v1/inventory/:productId'
order: 3000
headers:
  - key: Authorization
    value: 'Bearer {{access_token}}'
pathVariables:
  - key: productId
    value: '{{product_id}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Inventory lookup succeeded', function () {
        pm.expect(pm.response.code).to.be.within(200, 299);
      });
