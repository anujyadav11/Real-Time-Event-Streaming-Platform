$kind: http-request
name: '6. Wait For Payment Completed'
method: GET
url: '{{base_url}}/api/v1/orders/:id'
order: 6000
headers:
  - key: Authorization
    value: 'Bearer {{access_token}}'
pathVariables:
  - key: id
    value: '{{order_id}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Order service responded while waiting for PaymentCompletedEvent', function () {
        pm.expect(pm.response.code).to.be.within(200, 299);
      });

      const json = pm.response.json();
      const currentAttempt = Number(pm.collectionVariables.get('payment_completed_poll_attempt') || 0);
      const maxAttempts = Number(pm.variables.get('payment_completed_max_attempts') || 10);
      const terminalFailureStates = ['CANCELLED'];

      pm.test('Order id is still the created order id', function () {
        pm.expect(json).to.have.property('id', pm.collectionVariables.get('order_id'));
      });

      pm.test('Order has not failed during payment flow', function () {
        pm.expect(json.status).to.not.be.oneOf(terminalFailureStates);
      });

      if (json.status === 'PAYMENT_COMPLETED' || json.status === 'OUT_FOR_DELIVERY' || json.status === 'DELIVERED') {
        pm.collectionVariables.unset('payment_completed_poll_attempt');
        pm.collectionVariables.set('payment_completed_status', json.status);

        pm.test('Order service consumed PaymentCompletedEvent', function () {
          pm.expect(json.status).to.be.oneOf(['PAYMENT_COMPLETED', 'OUT_FOR_DELIVERY', 'DELIVERED']);
        });
      } else if (currentAttempt < maxAttempts) {
        pm.collectionVariables.set('payment_completed_poll_attempt', currentAttempt + 1);
        postman.setNextRequest('6. Wait For Payment Completed');
      } else {
        pm.collectionVariables.unset('payment_completed_poll_attempt');
        pm.test('Order reached PAYMENT_COMPLETED after payment command/event flow', function () {
          pm.expect(json.status, `last observed order status after ${maxAttempts} retries`).to.be.oneOf(['PAYMENT_COMPLETED', 'OUT_FOR_DELIVERY', 'DELIVERED']);
        });
      }
