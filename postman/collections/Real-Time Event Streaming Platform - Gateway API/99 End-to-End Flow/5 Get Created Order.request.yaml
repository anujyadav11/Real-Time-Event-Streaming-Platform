$kind: http-request
name: '5. Get Created Order'
method: GET
url: '{{base_url}}/api/v1/orders/:id'
order: 5000
headers:
  - key: Authorization
    value: 'Bearer {{access_token}}'
pathVariables:
  - key: id
    value: '{{order_id}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Created order can be fetched', function () {
        pm.expect(pm.response.code).to.be.within(200, 299);
      });

      const json = pm.response.json();
      const allowedAsyncStates = ['CREATED', 'INVENTORY_RESERVED', 'PAYMENT_PENDING', 'PAYMENT_COMPLETED', 'OUT_FOR_DELIVERY', 'DELIVERED'];

      pm.test('Fetched order id matches created order id', function () {
        pm.expect(json).to.have.property('id', pm.collectionVariables.get('order_id'));
      });

      pm.test('Order has entered the saga flow', function () {
        pm.expect(json.status).to.be.oneOf(allowedAsyncStates);
      });
