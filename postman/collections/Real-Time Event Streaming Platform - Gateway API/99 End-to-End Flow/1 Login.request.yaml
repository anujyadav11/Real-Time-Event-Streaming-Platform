$kind: http-request
name: '1. Login and Save Token'
method: POST
url: '{{base_url}}/auth/login'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "username": "{{username}}",
      "password": "{{password}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Login succeeded', function () {
        pm.expect(pm.response.code).to.be.within(200, 299);
      });
      const json = pm.response.json();
      if (json.accessToken) {
        pm.collectionVariables.set('access_token', json.accessToken);
      }
