$kind: http-request
name: '13. Notification - Verify Async Sent'
method: GET
url: '{{base_url}}/api/v1/orders/:id'
order: 13000
headers:
  - key: Authorization
    value: 'Bearer {{access_token}}'
pathVariables:
  - key: id
    value: '{{service_test_order_id}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Final order lookup succeeds for notification verification', function () {
        pm.expect(pm.response.code).to.be.within(200, 299);
      });

      const json = pm.response.json();
      const currentAttempt = Number(pm.collectionVariables.get('service_notification_poll_attempt') || 0);
      const maxAttempts = Number(pm.variables.get('service_notification_max_attempts') || 10);
      const notificationTriggerStates = ['PAYMENT_COMPLETED', 'OUT_FOR_DELIVERY', 'DELIVERED'];

      pm.test('Notification verification uses the service-test order', function () {
        pm.expect(json).to.have.property('id', pm.collectionVariables.get('service_test_order_id'));
      });

      if (notificationTriggerStates.includes(json.status)) {
        pm.collectionVariables.unset('service_notification_poll_attempt');
        pm.collectionVariables.set('service_notification_expected_sent', 'true');

        pm.test('Notification command path was triggered after payment/delivery flow', function () {
          pm.expect(json.status).to.be.oneOf(notificationTriggerStates);
        });

        pm.test('Delivery service was checked before notification verification', function () {
          pm.expect(pm.collectionVariables.get('service_delivery_status')).to.be.oneOf(['CREATED', 'DRIVER_ASSIGNED', 'PICKED_UP', 'OUT_FOR_DELIVERY', 'DELIVERED']);
        });
      } else if (currentAttempt < maxAttempts) {
        pm.collectionVariables.set('service_notification_poll_attempt', currentAttempt + 1);
        postman.setNextRequest('13. Notification - Verify Async Sent');
      } else {
        pm.collectionVariables.unset('service_notification_poll_attempt');
        pm.test('Notification async command path reaches a trigger state', function () {
          pm.expect(json.status, `last observed order status after ${maxAttempts} retries`).to.be.oneOf(notificationTriggerStates);
        });
      }
