$kind: http-request
name: '9. Orders - Get By Id'
method: GET
url: '{{base_url}}/api/v1/orders/:id'
order: 9000
headers:
  - key: Authorization
    value: 'Bearer {{access_token}}'
pathVariables:
  - key: id
    value: '{{service_test_order_id}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Order service get-by-id endpoint succeeds through gateway', function () {
        pm.expect(pm.response.code).to.be.within(200, 299);
      });

      const json = pm.response.json();
      pm.test('Fetched order id matches created order id', function () {
        pm.expect(json).to.have.property('id', pm.collectionVariables.get('service_test_order_id'));
      });

      pm.test('Fetched order has a valid lifecycle status', function () {
        pm.expect(json.status).to.be.oneOf(['CREATED', 'INVENTORY_RESERVED', 'PAYMENT_PENDING', 'PAYMENT_COMPLETED', 'OUT_FOR_DELIVERY', 'DELIVERED', 'CANCELLED']);
      });
