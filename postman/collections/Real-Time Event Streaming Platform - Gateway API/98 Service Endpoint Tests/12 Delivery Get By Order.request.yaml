$kind: http-request
name: '12. Delivery - Get By Order'
method: GET
url: '{{base_url}}/api/v1/deliveries/:orderId'
order: 12000
headers:
  - key: Authorization
    value: 'Bearer {{access_token}}'
pathVariables:
  - key: orderId
    value: '{{service_test_order_id}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Delivery service endpoint succeeds through gateway', function () {
        pm.expect(pm.response.code).to.be.within(200, 299);
      });

      const json = pm.response.json();
      pm.test('Delivery response is for the service-test order', function () {
        pm.expect(json).to.have.property('orderId', pm.collectionVariables.get('service_test_order_id'));
      });

      pm.test('Delivery has a valid lifecycle status', function () {
        pm.expect(json.status).to.be.oneOf(['CREATED', 'DRIVER_ASSIGNED', 'PICKED_UP', 'OUT_FOR_DELIVERY', 'DELIVERED']);
      });

      pm.collectionVariables.set('service_delivery_status', json.status);
