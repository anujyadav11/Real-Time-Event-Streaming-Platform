$kind: http-request
name: '7. Inventory - Release'
method: POST
url: '{{base_url}}/api/v1/inventory/release'
order: 7000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{access_token}}'
body:
  type: json
  content: |-
    {
      "productId": {{product_id}},
      "quantity": {{service_test_quantity}}
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Inventory release command succeeds through gateway', function () {
        pm.expect(pm.response.code).to.be.within(200, 299);
      });

      const json = pm.response.json();
      pm.test('Release response matches product', function () {
        pm.expect(String(json.productId)).to.eql(String(pm.variables.get('product_id')));
      });

      pm.test('Inventory quantities are valid after release', function () {
        pm.expect(Number(json.availableQuantity)).to.be.at.least(0);
        pm.expect(Number(json.reservedQuantity)).to.be.at.least(0);
      });
