$kind: http-request
name: '1. Auth Login'
method: POST
url: '{{base_url}}/auth/login'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "username": "{{username}}",
      "password": "{{password}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Auth service login through gateway returns 2xx', function () {
        pm.expect(pm.response.code).to.be.within(200, 299);
      });

      const json = pm.response.json();
      pm.test('Auth response contains accessToken', function () {
        pm.expect(json).to.have.property('accessToken').that.is.a('string').and.is.not.empty;
      });

      if (json.accessToken) {
        pm.collectionVariables.set('access_token', json.accessToken);
        pm.environment.set('access_token', json.accessToken);
      }
