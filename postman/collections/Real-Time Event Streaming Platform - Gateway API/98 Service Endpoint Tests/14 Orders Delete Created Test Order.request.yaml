$kind: http-request
name: '14. Orders - Delete Created Test Order'
method: DELETE
url: '{{base_url}}/api/v1/orders/:id'
order: 14000
headers:
  - key: Authorization
    value: 'Bearer {{access_token}}'
pathVariables:
  - key: id
    value: '{{service_test_order_id}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Order service delete endpoint succeeds through gateway', function () {
        pm.expect(pm.response.code).to.be.oneOf([200, 202, 204]);
      });

      pm.collectionVariables.unset('service_test_order_id');
      pm.collectionVariables.unset('service_payment_status');
      pm.collectionVariables.unset('service_delivery_status');
      pm.collectionVariables.unset('service_notification_expected_sent');
