$kind: http-request
name: '8. Orders - Create Order'
method: POST
url: '{{base_url}}/api/v1/orders'
order: 8000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{access_token}}'
body:
  type: json
  content: |-
    {
      "customerName": "Gateway Service Test Customer",
      "restaurantName": "Gateway Service Test Restaurant",
      "productId": {{product_id}},
      "quantity": {{quantity}}
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Order service create endpoint succeeds through gateway', function () {
        pm.expect(pm.response.code).to.be.within(200, 299);
      });

      const json = pm.response.json();
      pm.test('Create order response has id and CREATED status', function () {
        pm.expect(json).to.have.property('id').that.is.a('string').and.is.not.empty;
        pm.expect(json).to.have.property('status', 'CREATED');
      });

      pm.test('Create order response has totalAmount', function () {
        pm.expect(Number(json.totalAmount)).to.be.above(0);
      });

      if (json.id) {
        pm.collectionVariables.set('service_test_order_id', json.id);
        pm.environment.set('service_test_order_id', json.id);
      }
