$kind: http-request
name: '10. Orders - Get All'
method: GET
url: '{{base_url}}/api/v1/orders'
order: 10000
headers:
  - key: Authorization
    value: 'Bearer {{access_token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Order service get-all endpoint succeeds through gateway', function () {
        pm.expect(pm.response.code).to.be.within(200, 299);
      });

      const json = pm.response.json();
      pm.test('Get all orders returns an array', function () {
        pm.expect(json).to.be.an('array');
      });

      pm.test('Created service-test order appears in get-all response', function () {
        const orderId = pm.collectionVariables.get('service_test_order_id');
        pm.expect(json.some(order => order.id === orderId)).to.eql(true);
      });
