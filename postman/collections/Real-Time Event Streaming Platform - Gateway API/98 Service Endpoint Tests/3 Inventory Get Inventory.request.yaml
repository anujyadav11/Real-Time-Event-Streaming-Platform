$kind: http-request
name: '3. Inventory - Get Inventory'
method: GET
url: '{{base_url}}/api/v1/inventory/:productId'
order: 3000
headers:
  - key: Authorization
    value: 'Bearer {{access_token}}'
pathVariables:
  - key: productId
    value: '{{product_id}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Inventory service responds through gateway', function () {
        pm.expect(pm.response.code).to.be.within(200, 299);
      });

      const json = pm.response.json();
      pm.test('Inventory response matches requested product', function () {
        pm.expect(String(json.productId)).to.eql(String(pm.variables.get('product_id')));
      });

      pm.test('Inventory quantities are present', function () {
        pm.expect(json).to.have.property('availableQuantity');
        pm.expect(json).to.have.property('reservedQuantity');
      });

      pm.collectionVariables.set('inventory_available_before', String(json.availableQuantity));
      pm.collectionVariables.set('inventory_reserved_before', String(json.reservedQuantity));
