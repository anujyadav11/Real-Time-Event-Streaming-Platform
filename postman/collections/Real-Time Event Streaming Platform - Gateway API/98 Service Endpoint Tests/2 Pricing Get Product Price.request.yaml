$kind: http-request
name: '2. Pricing - Get Product Price'
method: GET
url: '{{base_url}}/api/pricing/products/:productId'
order: 2000
headers:
  - key: Authorization
    value: 'Bearer {{access_token}}'
pathVariables:
  - key: productId
    value: '{{product_id}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Pricing service responds through gateway', function () {
        pm.expect(pm.response.code).to.be.within(200, 299);
      });

      const json = pm.response.json();
      pm.test('Pricing response matches requested product', function () {
        pm.expect(String(json.productId)).to.eql(String(pm.variables.get('product_id')));
      });

      pm.test('Pricing response contains positive unit price', function () {
        pm.expect(Number(json.unitPrice)).to.be.above(0);
      });
