$kind: http-request
name: '4. Inventory - Reserve'
method: POST
url: '{{base_url}}/api/v1/inventory/reserve'
order: 4000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{access_token}}'
body:
  type: json
  content: |-
    {
      "productId": {{product_id}},
      "quantity": {{service_test_quantity}}
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Inventory reserve command succeeds through gateway', function () {
        pm.expect(pm.response.code).to.be.within(200, 299);
      });

      const json = pm.response.json();
      pm.test('Reserve response matches product', function () {
        pm.expect(String(json.productId)).to.eql(String(pm.variables.get('product_id')));
      });

      pm.test('Reserved quantity is present after reserve', function () {
        pm.expect(json).to.have.property('reservedQuantity');
        pm.expect(Number(json.reservedQuantity)).to.be.at.least(0);
      });
