server:
  port: 8080

spring:
  application:
    name: gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: order-service
              uri: ${ORDER_SERVICE_URL:lb://ORDER-SERVICE}
              predicates:
                - Path=/api/v1/orders/**
            - id: inventory-service
              uri: ${INVENTORY_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/api/inventory/**
            - id: payment-service
              uri: ${PAYMENT_SERVICE_URL:http://localhost:8083}
              predicates:
                - Path=/api/payments/**
            - id: notification-service
              uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8084}
              predicates:
                - Path=/api/notifications/**
            - id: tracking-service
              uri: ${TRACKING_SERVICE_URL:http://localhost:8085}
              predicates:
                - Path=/api/tracking/**
  eureka:
    client:
      service-url:
        defaultZone: http://localhost:8761/eureka/

      instance:
        prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
