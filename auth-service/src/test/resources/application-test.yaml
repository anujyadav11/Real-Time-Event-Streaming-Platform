spring:
  datasource:
    url: jdbc:h2:mem:auth;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  jwt:
    secret: MyVerySecretKeyForJwtAuthentication123456789
    expiration: 3600000
eureka:
  client:
    enabled: false

