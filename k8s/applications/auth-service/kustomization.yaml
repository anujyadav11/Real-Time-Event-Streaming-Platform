apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: event-platform

namePrefix: auth-service-

resources:
  - ../../base/spring-boot
  - configmap.yaml

patches:
  - target:
      kind: Deployment
    path: deployment-patch.yaml

  - target:
      kind: Service
    path: service-patch.yaml