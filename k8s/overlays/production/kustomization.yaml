apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Production keeps the base's HA settings and adds the registry credential
# reference required when GHCR packages are private.
resources:
  - ../../base

patches:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: app-.*
    patch: |-
      - op: add
        path: /spec/template/spec/imagePullSecrets
        value:
          - name: ghcr-pull-secret
