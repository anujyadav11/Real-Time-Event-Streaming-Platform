apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# Docker Desktop runs this platform on a single, memory-constrained node.
# Keep one replica and avoid surge pods so deployments can roll out locally.
patches:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: app-.*
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: add
        path: /spec/strategy
        value:
          type: Recreate

  - target:
      group: autoscaling
      version: v2
      kind: HorizontalPodAutoscaler
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 1

images:
  - name: api-gateway
    newName: event-platform/api-gateway
    newTag: swagger-test
  - name: auth-service
    newName: event-platform/auth-service
    newTag: swagger-test
  - name: order-service
    newName: event-platform/order-service
    newTag: swagger-test
  - name: inventory-service
    newName: event-platform/inventory-service
    newTag: swagger-test
  - name: pricing-service
    newName: event-platform/pricing-service
    newTag: swagger-test
  - name: delivery-service
    newName: event-platform/delivery-service
    newTag: swagger-test
