apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-ui
  namespace: event-platform

spec:
  replicas: 1

  selector:
    matchLabels:
      app: kafka-ui

  template:
    metadata:
      labels:
        app: kafka-ui

    spec:
      containers:
        - name: kafka-ui

          image: provectuslabs/kafka-ui:latest

          ports:
            - containerPort: 8080

          env:
            - name: KAFKA_CLUSTERS_0_NAME
              value: event-platform

            - name: KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS
              value: kafka:9092

            - name: DYNAMIC_CONFIG_ENABLED
              value: "true"

          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5

          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"