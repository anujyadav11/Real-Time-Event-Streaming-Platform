apiVersion: networking.k8s.io/v1
kind: NetworkPolicy

metadata:
  name: prometheus-policy

spec:
  podSelector:
    matchLabels:
      app: prometheus

  policyTypes:
    - Ingress
    - Egress

  ingress:
    - ports:
        - protocol: TCP
          port: 9090

  egress:
    - to:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - api-gateway
                  - auth-service
                  - order-service
                  - inventory-service
                  - pricing-service
                  - payment-service
                  - notification-service
                  - delivery-service
                  - saga-orchestrator
                  - websocket-service
                  - config-server
                  - discovery-server
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8081
        - protocol: TCP
          port: 8082
        - protocol: TCP
          port: 8083
        - protocol: TCP
          port: 8084
        - protocol: TCP
          port: 8086
        - protocol: TCP
          port: 8087
        - protocol: TCP
          port: 8088
        - protocol: TCP
          port: 8089
        - protocol: TCP
          port: 8095
        - protocol: TCP
          port: 8761
        - protocol: TCP
          port: 8888
---
