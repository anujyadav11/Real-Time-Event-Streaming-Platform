apiVersion: networking.k8s.io/v1
kind: NetworkPolicy

metadata:
  name: platform-dns-policy

spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - config-server
          - prometheus
          - grafana
          - kafka-ui

  policyTypes:
    - Egress

  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy

metadata:
  name: config-server-policy

spec:
  podSelector:
    matchLabels:
      app: config-server

  policyTypes:
    - Ingress
    - Egress

  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - api-gateway
                  - auth-service
                  - order-service
                  - inventory-service
                  - pricing-service
                  - payment-service
                  - notification-service
                  - delivery-service
                  - saga-orchestrator
                  - websocket-service
                  - prometheus
      ports:
        - protocol: TCP
          port: 8888

  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
---
