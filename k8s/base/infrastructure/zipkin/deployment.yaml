apiVersion: apps/v1
kind: Deployment

metadata:
  name: zipkin
  namespace: event-platform

spec:
  replicas: 1

  selector:
    matchLabels:
      app: zipkin

  template:
    metadata:
      labels:
        app: zipkin

    spec:
      containers:
        - name: zipkin

          image: openzipkin/zipkin:3

          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 9411

          readinessProbe:
            httpGet:
              path: /health
              port: 9411
            initialDelaySeconds: 15
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /health
              port: 9411
            initialDelaySeconds: 30
            periodSeconds: 15