apiVersion: apps/v1
kind: Deployment

metadata:
  name: kafka-ui
  namespace: event-platform

spec:
  replicas: 1

  selector:
    matchLabels:
      app: kafka-ui

  template:
    metadata:
      labels:
        app: kafka-ui

    spec:
      containers:
        - name: kafka-ui

          image: provectuslabs/kafka-ui:latest

          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8080

          env:
            - name: DYNAMIC_CONFIG_ENABLED
              value: "true"

            - name: KAFKA_CLUSTERS_0_NAME
              value: "event-platform"

            - name: KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS
              value: "kafka:9092"

          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15