apiVersion: apps/v1
kind: Deployment

metadata:
  name: app

spec:
  replicas: 2

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: auth-service

  template:
    metadata:
      labels:
        app: auth-service

    spec:
      terminationGracePeriodSeconds: 30

      containers:
        - name: app

          image: auth-service:1.0
          imagePullPolicy: IfNotPresent

          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - sleep 15

          ports:
            - containerPort: 8087

          envFrom:
            - configMapRef:
                name: platform-config
            - configMapRef:
                name: auth-service-config

          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: platform-secret
                  key: JWT_SECRET

          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8087
            periodSeconds: 10
            failureThreshold: 30

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8087
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8087
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 5

          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"
