apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

nameSuffix: -discovery-server

resources:
  - ../../common/deployment
  - ../../common/service

patches:
  - path: deployment-patch.yaml

  - target:
      group: apps
      version: v1
      kind: Deployment
      name: app
    path: deployment-probes-and-ports.json

  - path: service-patch.yaml

namespace: event-platform