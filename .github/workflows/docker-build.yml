name : Docker Image Build

on:
  workflow_dispatch:

    push:
      branch:
        -main

jobs:
  docker-build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - config-server
          - discovery-server
          - order-service
          - inventory-service
          - pricing-service
          - payment-service
          - notification-service
          - delivery-service
          - websocket-service
          - saga-orchestrator

        steps:
          - name: Checkout Repository
            uses: actions/checkout@v4

          - name: Set up Docker Buildx
            uses: docker/setup-buildx-action@v4

          - name: Build Docker Image
            uses: docker/build-push-action@v4
            with:
              context: ./${{ matrix.service }}
              push: false
              tags: event-platform/${{ matrix.service }}:latest