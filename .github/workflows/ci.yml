name: Event Platform CI/CD

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:

  build:
    name: Build & Test

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build Project
        run: mvn -B clean verify

  docker:

    name: Docker Build & Push

    needs: build

    if: github.event_name == 'push'

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false

      matrix:
        service:
          - api-gateway
          - auth-service
          - config-server
          - discovery-server
          - order-service
          - inventory-service
          - pricing-service
          - payment-service
          - notification-service
          - delivery-service
          - websocket-service
          - saga-orchestrator

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build Project
        run: mvn -B package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.sha }}
            type=ref,event=branch

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:

    name: Deploy to Kubernetes
    needs: docker
    # Pull requests run CI only. A successful push to main is the deployment
    # trigger, after every service image has been pushed.

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    environment:
      name: production

    # Keep production releases ordered without making CI runs wait for one.
    concurrency:
      group: event-platform-production
      cancel-in-progress: false

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure cluster access
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          set -euo pipefail
          test -n "$KUBECONFIG_B64" || {
            echo "KUBECONFIG_B64 is required to deploy to Kubernetes." >&2
            exit 1
          }
          echo "$KUBECONFIG_B64" | base64 --decode > "$RUNNER_TEMP/kubeconfig"
          chmod 600 "$RUNNER_TEMP/kubeconfig"
          echo "KUBECONFIG=$RUNNER_TEMP/kubeconfig" >> "$GITHUB_ENV"

      - name: Configure GHCR image pull secret
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$GHCR_USERNAME" && test -n "$GHCR_PULL_TOKEN" || {
            echo "GHCR_USERNAME and GHCR_PULL_TOKEN are required for private GHCR images." >&2
            exit 1
          }
          kubectl --namespace event-platform create secret docker-registry ghcr-pull-secret \
            --docker-server=ghcr.io \
            --docker-username="$GHCR_USERNAME" \
            --docker-password="$GHCR_PULL_TOKEN" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply commit images and Kubernetes manifests
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          manifest="$RUNNER_TEMP/event-platform.yaml"
          kubectl kustomize k8s/overlays/production > "$manifest"
          for service in \
            api-gateway auth-service config-server discovery-server order-service \
            inventory-service pricing-service payment-service notification-service \
            delivery-service websocket-service saga-orchestrator; do
            image="$REGISTRY/$owner/$service:$IMAGE_TAG"
            sed -i.bak "s#image: $service:1.0#image: $image#" "$manifest"
            grep -Fq "image: $image" "$manifest"
          done
          rm -f "$manifest.bak"
          kubectl apply -f "$manifest"

      - name: Verify rollouts
        run: |
          set -euo pipefail
          for service in \
            api-gateway auth-service config-server discovery-server order-service \
            inventory-service pricing-service payment-service notification-service \
            delivery-service websocket-service saga-orchestrator; do
            kubectl --namespace event-platform rollout status "deployment/app-$service" --timeout=10m
          done
